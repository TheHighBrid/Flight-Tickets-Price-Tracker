name: Live Flight Tracker CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: live-flight-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Reject simulated fare code
        shell: bash
        run: |
          set -euo pipefail
          if grep -R -n -E 'Northstar Air|Atlas Connect|Maple Jet|Cloudline|Horizon Wings|Aero Nova|Blue Arc|routeFactor|deterministic demo fares' app/src/main; then
            echo 'Simulated fare or invented airline code is forbidden.' >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: server/requirements-dev.txt

      - name: Create diagnostics directory
        run: mkdir -p build-logs

      - name: Test secure flight backend
        shell: bash
        run: |
          set -o pipefail
          python -m pip install --upgrade pip
          pip install -r server/requirements-dev.txt
          PYTHONPATH=server python -m pytest -q server/tests 2>&1 | tee build-logs/backend-tests.log

      - name: Upload backend diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-diagnostics
          path: build-logs/backend-tests.log
          if-no-files-found: error
          retention-days: 14

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;36.0.0"

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.5.0'

      - name: Run live-model smoke test
        run: bash scripts/smoke_test.sh

      - name: Run Android unit tests
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace test 2>&1 | tee build-logs/unit-tests.log

      - name: Run Android lint
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace lint 2>&1 | tee build-logs/lint.log

      - name: Assemble installable APK
        shell: bash
        env:
          FLIGHT_API_BASE_URL: ${{ vars.FLIGHT_API_BASE_URL }}
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace assembleDebug 2>&1 | tee build-logs/assemble-debug.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-flight-build-diagnostics
          path: build-logs/*.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: live-flight-price-tracker-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
