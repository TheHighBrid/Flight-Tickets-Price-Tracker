name: Android CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;36.0.0"

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.5.0'

      - name: Show build environment
        run: |
          java -version
          gradle --version

      - name: Run core smoke test
        run: bash scripts/smoke_test.sh

      - name: Create diagnostics directory
        run: mkdir -p build-logs

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace test 2>&1 | tee build-logs/unit-tests.log

      - name: Run Android lint
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace lint 2>&1 | tee build-logs/lint.log

      - name: Assemble installable beta APK
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace assembleDebug 2>&1 | tee build-logs/assemble-debug.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-build-diagnostics
          path: build-logs/*.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload beta APK
        uses: actions/upload-artifact@v7
        with:
          name: flight-tickets-price-tracker-beta-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
