name: Android Beta Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.9'
      - name: Test, lint, and build
        run: gradle --no-daemon test lint assembleDebug
      - name: Prepare beta APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/flight-tickets-price-tracker-${GITHUB_REF_NAME}.apk
      - name: Upload beta APK
        uses: actions/upload-artifact@v7
        with:
          name: flight-tickets-price-tracker-${{ github.ref_name }}-apk
          path: dist/*.apk
          if-no-files-found: error
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.apk
          generate_release_notes: true
